<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    background: #f4f6f9;
    font-family: Arial, sans-serif;
}

.dashboard {
    max-width: 1000px;
    margin: auto;
    padding: 30px;
}

.top-bar {
    display: flex;
    justify-content: space-between;
    margin-bottom: 20px;
}

button {
    padding: 8px 12px;
    cursor: pointer;
}

.stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 20px;
}

.stat-box {
    background: white;
    padding: 15px;
    border-radius: 8px;
    text-align: center;
}

.chart-box {
    background: white;
    padding: 20px;
    border-radius: 8px;
    margin-bottom: 20px;
}

.message-card {
    background: white;
    padding: 15px;
    margin: 10px 0;
    border-radius: 8px;
}

.read {
    opacity: 0.6;
}
</style>
</head>

<body>

<div class="dashboard">

<div class="top-bar">
    <h2>Admin Dashboard</h2>
    <button onclick="logout()">Logout</button>
</div>

<div class="stats">
    <div class="stat-box"><h3>Total</h3><p id="totalCount">0</p></div>
    <div class="stat-box"><h3>Read</h3><p id="readCount">0</p></div>
    <div class="stat-box"><h3>Unread</h3><p id="unreadCount">0</p></div>
    <div class="stat-box"><h3>Last</h3><p id="lastTime">--</p></div>
</div>

<div class="chart-box">
    <canvas id="chart"></canvas>
</div>

<div id="messages">Loading...</div>

</div>

<script>

const API_URL = "https://portfolio-backend-rgbj.onrender.com";
const token = localStorage.getItem("ADMIN_TOKEN");

if (!token) location.href = "login.html";

function logout(){
    localStorage.removeItem("ADMIN_TOKEN");
    location.href="login.html";
}

function formatIST(date){
    if(!date) return "--";
    return new Date(date).toLocaleString("en-IN",{timeZone:"Asia/Kolkata"});
}

let chart;

async function loadStats(){
    const res = await fetch(API_URL+"/admin/stats",{
        headers:{Authorization:"Bearer "+token}
    });

    if(res.status===401){logout();return;}

    const d = await res.json();

    document.getElementById("totalCount").innerText = d.total_messages || 0;
    document.getElementById("readCount").innerText = d.read_messages || 0;
    document.getElementById("unreadCount").innerText = d.unread_messages || 0;
    document.getElementById("lastTime").innerText = formatIST(d.last_message_time);

    if(chart) chart.destroy();

    chart = new Chart(document.getElementById("chart"),{
        type:"pie",
        data:{
            labels:["Read","Unread"],
            datasets:[{
                data:[d.read_messages || 0, d.unread_messages || 0],
                backgroundColor:["green","red"]
            }]
        }
    });
}

async function loadMessages(){

    const res = await fetch(API_URL+"/admin/messages?limit=20",{
        headers:{Authorization:"Bearer "+token}
    });

    if(res.status===401){logout();return;}

    const data = await res.json();

    console.log("DATA:", data);

    const messages = data.messages || [];

    renderMessages(messages);
}

function renderMessages(messages){

    const box = document.getElementById("messages");
    box.innerHTML = "";

    if(messages.length===0){
        box.innerText="No messages found.";
        return;
    }

    messages.forEach(m=>{

        const div=document.createElement("div");
        div.className="message-card";

        if(m.is_read) div.classList.add("read");

        div.innerHTML=`
            <p><b>Name:</b> ${m.name}</p>
            <p><b>Email:</b> ${m.email}</p>
            <p><b>Message:</b> ${m.message}</p>
            <p>${formatIST(m.created_at)}</p>

            <button onclick="toggleRead(${m.id})">
                ${m.is_read ? "Unread":"Read"}
            </button>

            <button onclick="deleteMsg(${m.id})">Delete</button>
        `;

        box.appendChild(div);
    });
}

async function toggleRead(id){

    await fetch(API_URL+`/admin/messages/${id}/toggle-read`,{
        method:"PUT",
        headers:{Authorization:"Bearer "+token}
    });

    loadMessages();
    loadStats();
}

async function deleteMsg(id){

    if(!confirm("Delete?")) return;

    await fetch(API_URL+`/admin/messages/${id}`,{
        method:"DELETE",
        headers:{Authorization:"Bearer "+token}
    });

    loadMessages();
    loadStats();
}

loadStats();
loadMessages();

</script>

</body>
</html>
