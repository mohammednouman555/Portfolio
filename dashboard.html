<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{background:#0f172a;color:white;font-family:sans-serif}
.container{max-width:1100px;margin:auto;padding:20px}
input{padding:8px;margin:10px 0;width:200px}
button{padding:6px 10px;margin:5px;border:none;cursor:pointer}
.card{background:#1e293b;padding:15px;border-radius:10px;margin-top:10px}
</style>
</head>

<body>

<div class="container">

<h2>Admin Dashboard</h2>

<input id="search" placeholder="Search name">
<button onclick="loadMessages()">Search</button>

<button onclick="exportCSV()">Export CSV</button>

<div id="stats"></div>
<canvas id="chart"></canvas>

<div id="messages"></div>

<div>
<button onclick="prev()">Prev</button>
<button onclick="next()">Next</button>
</div>

<h3>Activity</h3>
<div id="activity"></div>

</div>

<script>

const API="https://portfolio-backend-rgbj.onrender.com"
const token=localStorage.getItem("ADMIN_TOKEN")

let page=1

function format(d){
return d?new Date(d).toLocaleString():"--"
}

async function loadStats(){
let r=await fetch(API+"/admin/stats",{headers:{Authorization:"Bearer "+token}})
let d=await r.json()

document.getElementById("stats").innerHTML=
`Total:${d.total_messages} Read:${d.read_messages} Unread:${d.unread_messages}`

new Chart(document.getElementById("chart"),{
type:"doughnut",
data:{labels:["Read","Unread"],
datasets:[{data:[d.read_messages,d.unread_messages]}]}
})
}

async function loadMessages(){

let search=document.getElementById("search").value

let r=await fetch(API+`/admin/messages?page=${page}&search=${search}`,{
headers:{Authorization:"Bearer "+token}
})

let d=await r.json()

let box=document.getElementById("messages")
box.innerHTML=""

d.messages.forEach(m=>{
box.innerHTML+=`
<div class="card">
<b>${m.name}</b><br>
${m.email}<br>
${m.message}<br>
${format(m.created_at)}

<br>
<button onclick="toggle(${m.id})">Toggle</button>
<button onclick="del(${m.id})">Delete</button>
</div>`
})
}

async function del(id){
await fetch(API+`/admin/messages/${id}`,{method:"DELETE",headers:{Authorization:"Bearer "+token}})
loadMessages()
}

async function toggle(id){
await fetch(API+`/admin/messages/${id}/toggle-read`,{method:"PUT",headers:{Authorization:"Bearer "+token}})
loadMessages()
}

function next(){page++;loadMessages()}
function prev(){if(page>1)page--;loadMessages()}

function exportCSV(){
window.open(API+"/admin/export")
}

async function loadActivity(){
let r=await fetch(API+"/admin/activity",{headers:{Authorization:"Bearer "+token}})
let d=await r.json()

let box=document.getElementById("activity")
box.innerHTML=""

d.forEach(a=>{
box.innerHTML+=`<div class="card">${a.action} - ${format(a.created_at)}</div>`
})
}

loadStats()
loadMessages()
loadActivity()

</script>

</body>
</html>
