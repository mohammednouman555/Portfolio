<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body {
    background: #f4f6f9;
    font-family: 'Segoe UI';
}

.dashboard {
    max-width: 1000px;
    margin: auto;
    padding: 30px;
}

.top-bar {
    display: flex;
    justify-content: space-between;
}

button {
    background: #0077b6;
    color: white;
    padding: 8px;
    border: none;
    border-radius: 5px;
}

.message-card {
    background: white;
    padding: 15px;
    margin: 15px 0;
    border-left: 5px solid #0077b6;
    border-radius: 6px;
}

.read {
    opacity: 0.6;
}

</style>
</head>

<body>

<div class="dashboard">

<div class="top-bar">
<h2>Admin Dashboard</h2>
<button onclick="logout()">Logout</button>
</div>

<input id="searchInput" placeholder="Search...">
<button onclick="searchMessages()">Search</button>

<div id="messages"></div>

</div>

<script>

const API_URL = "https://portfolio-backend-rgbj.onrender.com";
const token = localStorage.getItem("ADMIN_TOKEN");

function logout(){
    localStorage.removeItem("ADMIN_TOKEN");
    location.href="login.html";
}

async function loadMessages(page=1, search=""){

    const res = await fetch(
        API_URL + `/admin/messages?page=${page}&limit=5&search=${search}`,
        {
            headers:{Authorization:"Bearer "+token}
        }
    );

    const data = await res.json();
    renderMessages(data.messages);
}

function renderMessages(messages){

    const box = document.getElementById("messages");
    box.innerHTML="";

    messages.forEach(msg=>{

        const div=document.createElement("div");

        div.className="message-card";

        if(msg.is_read){
            div.classList.add("read");
        } else {
            div.style.borderLeft="5px solid red";
        }

        div.innerHTML=`
        <p>${msg.name}</p>
        <p>${msg.email}</p>
        <p>${msg.message}</p>
        `;

        box.appendChild(div);
    });
}

function searchMessages(){
    const s=document.getElementById("searchInput").value;
    loadMessages(1,s);
}

loadMessages();

</script>

</body>
</html>
