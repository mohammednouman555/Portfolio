<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<style>
body{font-family:Arial;background:#f5f7fa;margin:0}
.container{max-width:1000px;margin:auto;padding:20px}
.card{background:white;padding:15px;border-radius:10px;margin:10px 0;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
button{padding:6px 10px;margin:5px;border:none;background:#0077b6;color:white;border-radius:5px;cursor:pointer}
</style>
</head>

<body>

<div class="container">

<h2>Admin Dashboard</h2>

<button onclick="exportCSV()">Export CSV</button>

<div id="stats"></div>

<div id="messages"></div>

</div>

<script>

const API="https://portfolio-backend-rgbj.onrender.com"
const token=localStorage.getItem("ADMIN_TOKEN")

function format(d){
return d?new Date(d).toLocaleString():"--"
}

async function loadStats(){
let r=await fetch(API+"/admin/stats",{headers:{Authorization:"Bearer "+token}})
let d=await r.json()

document.getElementById("stats").innerHTML=
`<div class="card">
Total: ${d.total_messages} <br>
Read: ${d.read_messages} <br>
Unread: ${d.unread_messages} <br>
Last: ${format(d.last_message_time)}
</div>`
}

async function loadMessages(){

let r=await fetch(API+"/admin/messages",{headers:{Authorization:"Bearer "+token}})
let d=await r.json()

let box=document.getElementById("messages")
box.innerHTML=""

d.messages.forEach(m=>{
box.innerHTML+=`
<div class="card">
<b>${m.name}</b><br>
${m.email}<br>
${m.message}<br>
<small>${format(m.created_at)}</small><br>

<button onclick="toggle(${m.id})">Toggle</button>
<button onclick="del(${m.id})">Delete</button>
</div>`
})
}

async function del(id){
await fetch(API+`/admin/messages/${id}`,{method:"DELETE",headers:{Authorization:"Bearer "+token}})
loadMessages()
loadStats()
}

async function toggle(id){
await fetch(API+`/admin/messages/${id}/toggle-read`,{method:"PUT",headers:{Authorization:"Bearer "+token}})
loadMessages()
}

function exportCSV(){
window.open(API+"/admin/export")
}

loadStats()
loadMessages()

</script>

</body>
</html>
