<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body {
    background: #f4f6f9;
    font-family: Arial, sans-serif;
}

.dashboard {
    max-width: 1000px;
    margin: auto;
    padding: 30px;
}

.top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 25px;
}

button {
    padding: 8px 12px;
    cursor: pointer;
    border: none;
    background: #0077b6;
    color: white;
    border-radius: 5px;
}

button:hover {
    background: #023e8a;
}

.stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 15px;
    margin-bottom: 25px;
}

.stat-box {
    background: white;
    padding: 15px;
    border-radius: 8px;
    text-align: center;
}

.stat-box h3 {
    margin: 0;
    color: #0077b6;
}

.stat-box p {
    font-size: 22px;
    font-weight: bold;
}

.chart-box {
    background: white;
    padding: 20px;
    border-radius: 8px;
    margin-bottom: 25px;
}

.message-card {
    background: white;
    padding: 15px;
    margin: 12px 0;
    border-radius: 8px;
}

.read {
    opacity: 0.6;
}

</style>
</head>

<body>

<div class="dashboard">

<div class="top-bar">
    <h2>Admin Dashboard</h2>
    <button onclick="logout()">Logout</button>
</div>

<div class="stats">
    <div class="stat-box"><h3>Total</h3><p id="totalCount">0</p></div>
    <div class="stat-box"><h3>Read</h3><p id="readCount">0</p></div>
    <div class="stat-box"><h3>Unread</h3><p id="unreadCount">0</p></div>
    <div class="stat-box"><h3>Last</h3><p id="lastTime">--</p></div>
</div>

<div class="chart-box">
    <canvas id="chart"></canvas>
</div>

<hr>

<div id="messages">Loading...</div>

</div>

<script>

/* ================= CONFIG ================= */

const API_URL = "https://portfolio-backend-rgbj.onrender.com";
const token = localStorage.getItem("ADMIN_TOKEN");

if (!token) {
    window.location.href = "login.html";
}

/* ================= LOGOUT ================= */

function logout() {
    localStorage.removeItem("ADMIN_TOKEN");
    window.location.href = "login.html";
}

/* ================= TIME FORMAT ================= */

function formatIST(date) {
    if (!date) return "--";
    return new Date(date).toLocaleString("en-IN", {
        timeZone: "Asia/Kolkata"
    });
}

/* ================= LOAD STATS ================= */

let chart = null;

async function loadStats() {

    try {

        const res = await fetch(API_URL + "/admin/stats", {
            headers: {
                "Authorization": "Bearer " + token
            }
        });

        if (res.status === 401) {
            logout();
            return;
        }

        const d = await res.json();

        document.getElementById("totalCount").innerText = d.total_messages || 0;
        document.getElementById("readCount").innerText = d.read_messages || 0;
        document.getElementById("unreadCount").innerText = d.unread_messages || 0;
        document.getElementById("lastTime").innerText = formatIST(d.last_message_time);

        if (chart) chart.destroy();

        chart = new Chart(document.getElementById("chart"), {
            type: "pie",
            data: {
                labels: ["Read", "Unread"],
                datasets: [{
                    data: [
                        d.read_messages || 0,
                        d.unread_messages || 0
                    ],
                    backgroundColor: ["#2ecc71", "#e74c3c"]
                }]
            },
            options: {
                plugins: {
                    legend: {
                        position: "bottom"
                    }
                }
            }
        });

    } catch (err) {
        console.error("Stats error:", err);
    }
}

/* ================= LOAD MESSAGES ================= */

async function loadMessages() {

    try {

        const res = await fetch(API_URL + "/admin/messages?limit=20", {
            headers: {
                "Authorization": "Bearer " + token
            }
        });

        if (res.status === 401) {
            logout();
            return;
        }

        const data = await res.json();

        console.log("Messages API:", data);

        const messages = data.messages || [];

        renderMessages(messages);

    } catch (err) {

        console.error("Messages error:", err);

        document.getElementById("messages").innerText =
            "Failed to load messages.";

    }
}

/* ================= RENDER ================= */

function renderMessages(messages) {

    const box = document.getElementById("messages");
    box.innerHTML = "";

    if (!messages.length) {
        box.innerText = "No messages found.";
        return;
    }

    messages.forEach(m => {

        const div = document.createElement("div");

        div.className = "message-card";

        if (m.is_read) div.classList.add("read");

        div.innerHTML = `
            <p><strong>Name:</strong> ${m.name}</p>
            <p><strong>Email:</strong> ${m.email}</p>
            <p><strong>Message:</strong> ${m.message}</p>
            <p><small>${formatIST(m.created_at)}</small></p>

            <button onclick="toggleRead(${m.id})">
                ${m.is_read ? "Mark Unread" : "Mark Read"}
            </button>

            <button onclick="deleteMsg(${m.id})">
                Delete
            </button>
        `;

        box.appendChild(div);
    });
}

/* ================= TOGGLE ================= */

async function toggleRead(id) {

    try {

        await fetch(API_URL + `/admin/messages/${id}/toggle-read`, {
            method: "PUT",
            headers: {
                "Authorization": "Bearer " + token
            }
        });

        await loadMessages();
        await loadStats();

    } catch (err) {
        console.error("Toggle error:", err);
    }
}

/* ================= DELETE ================= */

async function deleteMsg(id) {

    if (!confirm("Delete this message?")) return;

    try {

        await fetch(API_URL + `/admin/messages/${id}`, {
            method: "DELETE",
            headers: {
                "Authorization": "Bearer " + token
            }
        });

        await loadMessages();
        await loadStats();

    } catch (err) {
        console.error("Delete error:", err);
    }
}

/* ================= INIT ================= */

async function init() {
    await loadStats();
    await loadMessages();
}

init();

</script>

</body>
</html>
