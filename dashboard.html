<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body {
    font-family: Arial;
    background: #f4f6f9;
}

.dashboard {
    max-width: 1100px;
    margin: auto;
    padding: 20px;
}

.top {
    display: flex;
    justify-content: space-between;
    margin-bottom: 20px;
}

input {
    padding: 8px;
    width: 200px;
}

button {
    padding: 8px 12px;
    background: #0077b6;
    color: white;
    border: none;
    border-radius: 5px;
}

.card {
    background: white;
    padding: 15px;
    margin: 10px 0;
    border-radius: 8px;
}

.pagination {
    margin-top: 20px;
}

</style>
</head>

<body>

<div class="dashboard">

<div class="top">
    <h2>Admin Dashboard</h2>
    <button onclick="logout()">Logout</button>
</div>

<div style="display:flex; gap:10px;">
    <input id="search" placeholder="Search name/email">
    <button onclick="loadMessages()">Search</button>
    <button onclick="exportCSV()">Export CSV</button>
</div>

<p>
Total: <span id="total">0</span> |
Read: <span id="read">0</span> |
Unread: <span id="unread">0</span>
</p>

<hr>

<div id="messages">Loading...</div>

<div class="pagination">
    <button onclick="prev()">Prev</button>
    <span id="page">1</span>
    <button onclick="next()">Next</button>
</div>

</div>

<script>

const API = "https://portfolio-backend-rgbj.onrender.com";
const token = localStorage.getItem("ADMIN_TOKEN");

if(!token) location.href="login.html";

let page = 1;

function logout(){
    localStorage.removeItem("ADMIN_TOKEN");
    location.href="login.html";
}

function exportCSV(){
    window.open(API + "/admin/export?token=" + token);
}

async function loadStats(){

    const res = await fetch(API+"/admin/stats",{
        headers:{Authorization:"Bearer "+token}
    });

    const d = await res.json();

    document.getElementById("total").innerText = d.total_messages;
    document.getElementById("read").innerText = d.read_messages;
    document.getElementById("unread").innerText = d.unread_messages;
}

async function loadMessages(){

    const search = document.getElementById("search").value;

    const res = await fetch(
        API+`/admin/messages?page=${page}&limit=5&search=${search}`,{
        headers:{Authorization:"Bearer "+token}
    });

    const data = await res.json();

    const box = document.getElementById("messages");
    box.innerHTML="";

    if(!data.messages.length){
        box.innerText="No messages";
        return;
    }

    data.messages.forEach(m=>{

        const div=document.createElement("div");
        div.className="card";

        div.innerHTML=`
            <b>${m.name}</b> (${m.email})
            <p>${m.message}</p>
            <small>${new Date(m.created_at).toLocaleString()}</small>
            <br>
            <button onclick="toggle(${m.id})">
                ${m.is_read ? "Unread":"Read"}
            </button>
            <button onclick="del(${m.id})">Delete</button>
        `;

        box.appendChild(div);
    });

    document.getElementById("page").innerText = page;
}

async function toggle(id){
    await fetch(API+`/admin/messages/${id}/toggle-read`,{
        method:"PUT",
        headers:{Authorization:"Bearer "+token}
    });
    loadMessages();
    loadStats();
}

async function del(id){
    if(!confirm("Delete?")) return;

    await fetch(API+`/admin/messages/${id}`,{
        method:"DELETE",
        headers:{Authorization:"Bearer "+token}
    });

    loadMessages();
    loadStats();
}

function next(){ page++; loadMessages(); }
function prev(){ if(page>1) page--; loadMessages(); }

loadStats();
loadMessages();

</script>

</body>
</html>
