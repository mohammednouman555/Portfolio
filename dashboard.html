<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ===== BODY ===== */
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:#f4f6f9;
}

/* ===== CONTAINER ===== */
.dashboard{
    max-width:1100px;
    margin:auto;
    padding:25px;
}

/* ===== TOP BAR ===== */
.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

button{
    padding:8px 14px;
    border:none;
    border-radius:6px;
    background:#0077b6;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#023e8a;
}

/* ===== SEARCH ===== */
.search-box{
    margin-bottom:15px;
    display:flex;
    gap:10px;
}

.search-box input{
    flex:1;
    padding:10px;
    border-radius:6px;
    border:1px solid #ccc;
}

/* ===== STATS ===== */
.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:10px;
    margin-bottom:20px;
}

.stat-box{
    background:white;
    padding:15px;
    border-radius:8px;
    text-align:center;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

/* ===== CHART ===== */
.chart-box{
    background:white;
    padding:15px;
    border-radius:8px;
    margin-bottom:20px;
}

/* ===== MESSAGE CARD ===== */
.message-card{
    background:white;
    padding:15px;
    margin-bottom:15px;
    border-radius:8px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.message-card button{
    margin-top:8px;
    margin-right:8px;
}

/* ===== PAGINATION ===== */
.pagination{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:20px;
}

</style>
</head>

<body>

<div class="dashboard">

    <div class="top-bar">
        <h2>Admin Dashboard</h2>
        <button onclick="logout()">Logout</button>
    </div>

    <!-- SEARCH -->
    <div class="search-box">
        <input id="searchInput" placeholder="Search name or email">
        <button onclick="loadMessages()">Search</button>
    </div>

    <!-- STATS -->
    <div class="stats">
        <div class="stat-box">Total<br><b id="total">0</b></div>
        <div class="stat-box">Read<br><b id="read">0</b></div>
        <div class="stat-box">Unread<br><b id="unread">0</b></div>
        <div class="stat-box">Last<br><b id="last">--</b></div>
    </div>

    <!-- CHART -->
    <div class="chart-box">
        <canvas id="chart"></canvas>
    </div>

    <!-- MESSAGES -->
    <div id="messages">Loading...</div>

    <!-- PAGINATION -->
    <div class="pagination">
        <button onclick="prevPage()">Prev</button>
        <span id="pageNum">1</span>
        <button onclick="nextPage()">Next</button>
    </div>

</div>

<script>

/* ===== CONFIG ===== */
const API="https://portfolio-backend-rgbj.onrender.com";
const token=localStorage.getItem("ADMIN_TOKEN");

if(!token) location.href="login.html";

/* ===== LOGOUT ===== */
function logout(){
    localStorage.removeItem("ADMIN_TOKEN");
    location.href="login.html";
}

/* ===== TIME ===== */
function formatIST(date){
    if(!date) return "--";
    return new Date(date).toLocaleString("en-IN",{timeZone:"Asia/Kolkata"});
}

/* ===== PAGINATION ===== */
let page=1;

/* ===== LOAD STATS ===== */
async function loadStats(){
    try{
        const res=await fetch(API+"/admin/stats",{
            headers:{Authorization:"Bearer "+token}
        });

        const d=await res.json();

        document.getElementById("total").innerText=d.total_messages||0;
        document.getElementById("read").innerText=d.read_messages||0;
        document.getElementById("unread").innerText=d.unread_messages||0;
        document.getElementById("last").innerText=formatIST(d.last_message_time);

        drawChart(d.read_messages||0,d.unread_messages||0);

    }catch{
        console.log("stats error");
    }
}

/* ===== CHART ===== */
let chart;
function drawChart(r,u){
    const ctx=document.getElementById("chart");

    if(chart) chart.destroy();

    chart=new Chart(ctx,{
        type:"pie",
        data:{
            labels:["Read","Unread"],
            datasets:[{
                data:[r,u],
                backgroundColor:["#2ecc71","#e74c3c"]
            }]
        }
    });
}

/* ===== LOAD MESSAGES ===== */
async function loadMessages(){

    const box=document.getElementById("messages");
    const search=document.getElementById("searchInput").value;

    try{

        const res=await fetch(`${API}/admin/messages?page=${page}&limit=10&search=${search}`,{
            headers:{Authorization:"Bearer "+token}
        });

        const data=await res.json();
        const msgs=data.messages||[];

        box.innerHTML="";

        if(!msgs.length){
            box.innerText="No messages found";
            return;
        }

        msgs.forEach(m=>{
            const div=document.createElement("div");
            div.className="message-card";

            div.innerHTML=`
                <b>${m.name}</b> (${m.email})<br><br>
                ${m.message}<br><br>
                <small>${formatIST(m.created_at)}</small><br>
                <button onclick="toggle(${m.id})">Toggle</button>
                <button onclick="del(${m.id})">Delete</button>
            `;

            box.appendChild(div);
        });

    }catch{
        box.innerText="Error loading messages";
    }

    document.getElementById("pageNum").innerText=page;
}

/* ===== TOGGLE ===== */
async function toggle(id){
    await fetch(`${API}/admin/messages/${id}/toggle-read`,{
        method:"PUT",
        headers:{Authorization:"Bearer "+token}
    });
    loadMessages();
    loadStats();
}

/* ===== DELETE ===== */
async function del(id){
    if(!confirm("Delete this message?")) return;

    await fetch(`${API}/admin/messages/${id}`,{
        method:"DELETE",
        headers:{Authorization:"Bearer "+token}
    });

    loadMessages();
    loadStats();
}

/* ===== PAGINATION ===== */
function nextPage(){
    page++;
    loadMessages();
}

function prevPage(){
    if(page>1){
        page--;
        loadMessages();
    }
}

/* ===== INIT ===== */
loadStats();
loadMessages();

</script>

</body>
</html>
