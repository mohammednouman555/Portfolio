<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; background:#f4f6f9; }
.dashboard { max-width:900px; margin:auto; padding:20px; }
.message-card { background:white; padding:10px; margin:10px 0; }
button { margin:5px; padding:5px 10px; }
</style>
</head>

<body>

<div class="dashboard">

<h2>Admin Dashboard</h2>
<button onclick="logout()">Logout</button>

<p>Total: <span id="total">0</span></p>

<hr>

<div id="messages">Loading...</div>

</div>

<script>

const API = "https://portfolio-backend-rgbj.onrender.com";
const token = localStorage.getItem("ADMIN_TOKEN");

/* 🔴 FIX: PROTECT ROUTE */
if(!token){
    window.location.href="login.html";
}

/* ================= LOGOUT ================= */
function logout(){
    localStorage.removeItem("ADMIN_TOKEN");
    window.location.href="login.html";
}

/* ================= LOAD DATA ================= */

async function load(){

    try{

        /* ---------- STATS ---------- */
        const s = await fetch(API+"/admin/stats",{
            headers:{Authorization:"Bearer "+token}
        });

        if(s.status===401){
            logout();
            return;
        }

        const stats = await s.json();

        document.getElementById("total").innerText =
            stats.total_messages || 0;

        /* ---------- MESSAGES ---------- */
        const r = await fetch(API+"/admin/messages?limit=20",{
            headers:{Authorization:"Bearer "+token}
        });

        const data = await r.json();

        const messages = data.messages || [];

        const box = document.getElementById("messages");
        box.innerHTML="";

        if(messages.length===0){
            box.innerText="No messages found";
            return;
        }

        messages.forEach(m=>{

            const div=document.createElement("div");

            div.className="message-card";

            div.innerHTML=`
                <p>${m.name}</p>
                <p>${m.email}</p>
                <p>${m.message}</p>

                <button onclick="deleteMsg(${m.id})">Delete</button>
            `;

            box.appendChild(div);
        });

    }catch(e){

        console.error(e);
        document.getElementById("messages").innerText =
            "Error loading data";

    }
}

/* ================= DELETE ================= */

async function deleteMsg(id){

    await fetch(API+`/admin/messages/${id}`,{
        method:"DELETE",
        headers:{Authorization:"Bearer "+token}
    });

    load();
}

/* ================= INIT ================= */

load();

</script>

</body>
</html>
