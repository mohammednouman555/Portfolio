<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mohammed Nouman | Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #f5f7fb;
    color: #1e293b;
}

/* ===== NAVBAR ===== */

nav {
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    background: white;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    position: sticky;
    top: 0;
}

nav a {
    text-decoration: none;
    margin-left: 20px;
    color: #334155;
    font-weight: 500;
}

/* ===== HERO ===== */

.hero {
    text-align: center;
    padding: 70px 20px;
    background: linear-gradient(120deg, #e0f2fe, #f8fafc);
}

.hero h1 {
    margin: 0;
    font-size: 40px;
}

.hero p {
    margin-top: 10px;
    color: #64748b;
}

/* ===== SECTION ===== */

section {
    max-width: 1000px;
    margin: auto;
    padding: 50px 20px;
}

/* ===== CONTACT PREMIUM CARD ===== */

.contact-box {
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.08);
    max-width: 600px;
    margin: auto;
}

/* INPUTS */

.input-group {
    margin-bottom: 15px;
}

label {
    font-size: 14px;
    font-weight: 500;
    display: block;
    margin-bottom: 5px;
}

input, textarea {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #cbd5e1;
    font-size: 14px;
    outline: none;
    transition: 0.2s;
}

input:focus, textarea:focus {
    border-color: #3b82f6;
    box-shadow: 0 0 5px rgba(59,130,246,0.3);
}

/* BUTTON */

button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(90deg, #3b82f6, #2563eb);
    border: none;
    color: white;
    font-size: 15px;
    font-weight: 500;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    opacity: 0.9;
}

/* SUCCESS MESSAGE */

.success {
    text-align: center;
    margin-top: 10px;
    color: #16a34a;
    font-weight: 500;
}

/* FOOTER */

footer {
    text-align: center;
    padding: 20px;
    color: #64748b;
}

</style>
</head>

<body>

<!-- NAV -->
<nav>
    <div><b>Nouman</b></div>
    <div>
        <a href="#contact">Contact</a>
    </div>
</nav>

<!-- HERO -->
<div class="hero">
    <h1>Mohammed Nouman</h1>
    <p>Computer Science Engineer | Developer</p>
</div>

<!-- CONTACT -->
<section id="contact">

    <h2 style="text-align:center;margin-bottom:20px;">Contact Me</h2>

    <div class="contact-box">

        <div class="input-group">
            <label>Name</label>
            <input type="text" id="name" placeholder="Enter your name">
        </div>

        <div class="input-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="Enter your email">
        </div>

        <div class="input-group">
            <label>Message</label>
            <textarea id="message" rows="5" placeholder="Write your message..."></textarea>
        </div>

        <button onclick="sendMessage()">Send Message</button>

        <p id="response" class="success"></p>

    </div>

</section>

<footer>
© 2026 Mohammed Nouman
</footer>

<script>

const API = "https://portfolio-backend-rgbj.onrender.com";

async function sendMessage(){

    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const message = document.getElementById("message").value.trim();

    if(!name || !email || !message){
        alert("Please fill all fields");
        return;
    }

    try {

        const res = await fetch(API + "/contact", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({name,email,message})
        });

        if(res.ok){
            document.getElementById("response").innerText = "Message sent successfully!";
            document.getElementById("name").value="";
            document.getElementById("email").value="";
            document.getElementById("message").value="";
        } else {
            document.getElementById("response").innerText = "Failed to send message.";
        }

    } catch {
        document.getElementById("response").innerText = "Server error. Try again.";
    }
}

</script>

</body>
</html>
