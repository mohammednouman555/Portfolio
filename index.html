<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mohammed Nouman</title>

<style>

/* ===== GLOBAL ===== */
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    overflow-x:hidden;
    background:#0f172a;
    color:white;
}

/* ===== PARTICLES CANVAS ===== */
#particles{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:-1;
}

/* ===== GLASS EFFECT ===== */
.glass{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    border-radius:12px;
    box-shadow:0 8px 32px rgba(0,0,0,0.2);
}

/* ===== NAVBAR ===== */
.navbar{
    position:fixed;
    width:90%;
    left:5%;
    top:15px;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    z-index:1000;
}

.nav-links a{
    color:white;
    margin:0 10px;
    text-decoration:none;
}

/* ===== HERO ===== */
header{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.typing{
    font-size:22px;
    font-weight:bold;
    color:#38bdf8;
}

/* ===== BUTTON ===== */
.btn{
    padding:10px 18px;
    margin:10px;
    border-radius:8px;
    background:#38bdf8;
    color:black;
    text-decoration:none;
}

/* ===== SECTION ===== */
.section{
    margin:40px auto;
    width:85%;
    padding:30px;
}

/* ===== CHATBOT ===== */
.chat-btn{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#38bdf8;
    color:black;
    padding:15px;
    border-radius:50%;
    cursor:pointer;
}

.chatbox{
    position:fixed;
    bottom:80px;
    right:20px;
    width:300px;
    display:none;
    flex-direction:column;
}

.chat-body{
    height:200px;
    overflow-y:auto;
    padding:10px;
}

.chat-input{
    display:flex;
}

.chat-input input{
    flex:1;
    padding:8px;
}

.chat-input button{
    padding:8px;
    background:#38bdf8;
    border:none;
}

</style>
</head>

<body>

<canvas id="particles"></canvas>

<!-- NAVBAR -->
<div class="navbar glass">
    <h3>Nouman</h3>
    <div class="nav-links">
        <a href="#about">About</a>
        <a href="skills">My Skills</a>
        <a href="#contact">Contact</a>
    </div>
</div>

<!-- HERO -->
<header>
    <h1>Mohammed Nouman</h1>
    <p>I am a <span class="typing"></span></p>

    <a href="#contact" class="btn">Hire Me</a>
</header>

<!-- ABOUT -->
<div id="about" class="section glass">
    <h2>About Me</h2>
    <p>I build backend systems, automation tools, and full stack projects.</p>
</div>

<!-- Skills -->
<div id="skills" class="section glass">
    <h2>My Skills</h2>
    <datalist>
        Python
        Java
        C
        Java Script
    </datalist>
</div>

<!-- CONTACT -->
<div id="contact" class="section glass">
    <h2>Contact</h2>

    <form id="contactForm">
        <input id="name" placeholder="Name" required><br><br>
        <input id="email" placeholder="Email" required><br><br>
        <textarea id="message" placeholder="Message"></textarea><br><br>
        <button class="btn">Send</button>
    </form>

    <p id="responseMsg"></p>
</div>

<!-- CHAT -->
<div class="chat-btn" onclick="toggleChat()">💬</div>

<div class="chatbox glass" id="chatbox">
    <div class="chat-body" id="chatBody"></div>

    <div class="chat-input">
        <input id="chatInput">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>

/* ===== PARTICLES ===== */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

for(let i=0;i<80;i++){
    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        r:Math.random()*2,
        dx:Math.random()-0.5,
        dy:Math.random()-0.5
    });
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    particles.forEach(p=>{
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle="#38bdf8";
        ctx.fill();

        p.x+=p.dx;
        p.y+=p.dy;
    });

    requestAnimationFrame(animate);
}
animate();

/* ===== TYPING ===== */
const roles=["Developer","Backend Engineer","Python Programmer"];
let i=0,j=0,del=false;

function type(){
    let t=roles[i];
    j=del?j-1:j+1;

    document.querySelector(".typing").innerText=t.substring(0,j);

    if(!del && j===t.length){
        del=true; setTimeout(type,1000); return;
    }
    if(del && j===0){
        del=false; i=(i+1)%roles.length;
    }

    setTimeout(type,100);
}
type();

/* ===== CONTACT ===== */
document.getElementById("contactForm").addEventListener("submit",async(e)=>{
    e.preventDefault();

    await fetch("https://portfolio-backend-rgbj.onrender.com/contact",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            name:name.value,
            email:email.value,
            message:message.value
        })
    });

    responseMsg.innerText="Message Sent!";
});

/* ===== CHAT ===== */
function toggleChat(){
    let c=document.getElementById("chatbox");
    c.style.display=c.style.display==="flex"?"none":"flex";
}

function sendMessage(){
    let input=chatInput.value;
    if(!input) return;

    chatBody.innerHTML+=`<div>${input}</div>`;
    setTimeout(()=>{
        chatBody.innerHTML+=`<div style="color:#38bdf8">Ask about skills/projects!</div>`;
    },500);

    chatInput.value="";
}

</script>

</body>
</html>
